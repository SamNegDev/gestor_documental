<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Iniciar sesión</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div class="login-page">
    <div class="login-card">
        <div class="login-card-body">

            <div class="text-center mb-3">
                <img th:src="@{/images/logo_cn.png}" alt="Logo" style="max-height: 80px;">
            </div>
            <div class="login-brand text-center">Gestoría Portal</div>
            <div class="login-subtitle text-center">Accede para consultar y gestionar tus expedientes</div>

            <div th:if="${param.error}" class="alert alert-danger" role="alert">
                Email o contraseña incorrectos.
            </div>

            <div th:if="${param.logout}" class="alert alert-success" role="alert">
                Has cerrado sesión correctamente.
            </div>

            <form th:action="@{/login}" method="post">
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />
                <div class="mb-3">
                    <label for="username" class="form-label">Email</label>
                    <input type="email" id="username" name="username" class="form-control" autocomplete="username" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" id="password" name="password" class="form-control" autocomplete="current-password" required>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Entrar</button>
                </div>
            </form>

            <div class="login-footer">
                Portal privado de gestión documental
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
