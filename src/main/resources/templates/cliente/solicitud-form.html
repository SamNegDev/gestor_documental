<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/app}">

<section layout:fragment="content">
    <div class="card soft-card">
        <div class="card-body">
            <h4 class="section-title mb-4">Crear solicitud</h4>

            <form th:action="@{/cliente/solicitudes}" method="post">
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <div class="mb-3">
                    <label class="form-label">Tipo de trámite</label>
                    <select name="tipoTramiteId" class="form-select" required>
                        <option value="">Selecciona un tipo</option>
                        <option th:each="tipo : ${tiposTramite}"
                                th:value="${tipo.id}"
                                th:text="${tipo.nombre}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Matrícula</label>
                    <input type="text" name="matricula" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Observaciones</label>
                    <textarea name="observaciones" class="form-control" rows="4"></textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Guardar solicitud</button>
                    <a th:href="@{/solicitudes}" class="btn btn-outline-secondary">Cancelar</a>
                </div>

            </form>
        </div>
    </div>
</section>
</html>
