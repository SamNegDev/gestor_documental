<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/app}">

<section layout:fragment="content">

    <div class="card soft-card">
        <div class="card-body">

            <form th:action="@{/expedientes}" method="get" class="row g-2 align-items-end mb-4">



                <div class="col-md-2">
                    <label class="form-label">Estado</label>
                    <select name="estado" class="form-select">
                        <option value="">Todos</option>
                        <option th:each="estado : ${estadosExpediente}"
                                th:value="${estado}"
                                th:text="${#strings.replace(estado.name(), '_', ' ')}"
                                th:selected="${estadoSeleccionado != null and estado == estadoSeleccionado}">
                        </option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label class="form-label">Tipo de trámite</label>
                    <select name="tipoTramiteId" class="form-select">
                        <option value="">Todos</option>
                        <option th:each="tipo : ${tiposTramite}"
                                th:value="${tipo.id}"
                                th:text="${tipo.nombre}"
                                th:selected="${tipoTramiteIdSeleccionado != null and tipo.id == tipoTramiteIdSeleccionado}">
                        </option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label class="form-label">Matrícula</label>
                    <input type="text"
                           name="matricula"
                           class="form-control"
                           placeholder="Buscar matrícula"
                           th:value="${matriculaSeleccionada}">
                </div>

                <div class="col-auto">
                    <button type="submit" class="btn btn-primary">Filtrar</button>
                </div>

                <div class="col-md-auto" th:if="${hayFiltrosActivos}">
                    <a th:href="@{/expedientes}" class="btn btn-outline-secondary w-100">Limpiar</a>
                </div>
            </form>

            <div th:if="${expedientes == null or expedientes.isEmpty() and !hayFiltrosActivos}" class="empty-state">
                No tienes expedientes disponibles.
            </div>
            <div th:if="${expedientes == null or expedientes.isEmpty() and hayFiltrosActivos}" class="empty-state">
                No tienes expedientes disponibles con los filtros seleccionados.
            </div>

            <div class="table-responsive" th:if="${expedientes != null and !expedientes.isEmpty()}">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>Nº</th>
                        <th>Tipo trámite</th>
                        <th>Matrícula</th>
                        <th>Estado</th>
                        <th>Fecha</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="expediente : ${expedientes}">
                        <td th:text="${expediente.id}"></td>
                        <td th:text="${expediente.tipoTramite != null ? expediente.tipoTramite.nombre : 'Sin tipo'}"></td>
                        <td th:text="${expediente.matricula}"></td>
                        <td>
                            <span class="badge badge-estado"
                                  th:text="${expediente.estadoExpediente}"
                                  th:classappend="${expediente.estadoExpediente.name() == 'EN_TRAMITE'} ? ' badge-tramite' :
                                                  (${expediente.estadoExpediente.name() == 'FINALIZADO'} ? ' badge-finalizado' :
                                                  (${expediente.estadoExpediente.name() == 'REVISANDO_INCIDENCIAS'} ? ' badge-info' :
                                              (${expediente.estadoExpediente.name() == 'INCIDENCIA'} ? ' badge-incidencia' : ' badge-revision')))">
                            </span>
                        </td>
                        <td th:text="${#temporals.format(expediente.fechaCreacion, 'dd/MM/yyyy HH:mm')}"></td>
                        <td>
                            <a th:href="@{/expedientes/{id}(id=${expediente.id})}"
                               class="btn btn-sm btn-outline-primary">
                                Ver detalle
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</section>
</html>
