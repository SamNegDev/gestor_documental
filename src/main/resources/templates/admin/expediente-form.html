<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/app}">
<body>
<section layout:fragment="content">

  <div class="card soft-card">
    <div class="card-body">
      <h4 class="section-title mb-4">Crear expediente</h4>


      <form th:action="@{/admin/expedientes}" th:object="${expediente}" enctype="multipart/form-data" method="post">
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}">

        <div class="mb-3">
          <label class="form-label">Cliente</label>
          <select name="clienteId" class="form-select" required>
            <option value="">Selecciona un cliente</option>
            <option th:each="cliente : ${clientes}"
                    th:value="${cliente.id}"
                    th:text="${cliente.nombre}"
                    th:selected="${clienteId != null and cliente.id == clienteId}">
            </option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Tipo de trámite</label>
          <select name="tipoTramiteId" class="form-select" required>
            <option value="">Selecciona un tipo</option>
            <option th:each="tipo : ${tiposTramite}"
                    th:value="${tipo.id}"
                    th:text="${tipo.nombre}"
                    th:selected="${tipoTramiteId != null and tipo.id == tipoTramiteId}">
            </option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Matrícula</label>
          <input type="text" th:field="*{matricula}" class="form-control" required th:classappend="${#fields.hasErrors('matricula')} ? ' is-invalid' : ''">
        <div class="invalid-feedback"
             th:if="${#fields.hasErrors('matricula')}"
             th:errors="*{matricula}"></div>

        </div>

        <hr class="my-4">

        <div th:object="${interesadosForm}">
          <h3 class="section-title mb-3">Interesado 1</h3>

          <div class="row g-3 mb-4">
            <div class="col-md-4">
              <label class="form-label">Rol</label>
              <select th:field="*{interesado1.rol}" class="form-select">
                <option value="">Selecciona rol</option>
                <option value="COMPRADOR">Comprador</option>
                <option value="VENDEDOR">Vendedor</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label">Nombre</label>
              <input type="text" th:field="*{interesado1.nombre}" class="form-control"
              th:classappend="${#fields.hasErrors('interesado1.nombre')} ? ' is-invalid' : ''">

            <div class="invalid-feedback"
                   th:if="${#fields.hasErrors('interesado1.nombre')}"
                   th:errors="*{interesado1.nombre}"></div>
            </div>


            <div class="col-md-4">
              <label class="form-label">DNI/NIF</label>
              <input type="text"
                     th:field="*{interesado1.dni}"
                     class="form-control"
                     th:classappend="${#fields.hasErrors('interesado1.dni')} ? ' is-invalid' : ''">
            <div class="invalid-feedback"
                   th:if="${#fields.hasErrors('interesado1.dni')}"
                   th:errors="*{interesado1.dni}"></div>
            </div>

            <div class="col-md-4">
              <label class="form-label">Teléfono</label>
              <input type="text" th:field="*{interesado1.telefono}" class="form-control"
              th:classappend="${#fields.hasErrors('interesado1.telefono')} ? ' is-invalid' : ''">

            <div class="invalid-feedback"
                   th:if="${#fields.hasErrors('interesado1.telefono')}"
                   th:errors="*{interesado1.telefono}"></div>
            </div>


            <div class="col-12">
              <label class="form-label">Dirección</label>
              <input type="text" th:field="*{interesado1.direccion}" class="form-control"
              th:classappend="${#fields.hasErrors('interesado1.direccion')} ? ' is-invalid' : ''">
            <div class="invalid-feedback"
                   th:if="${#fields.hasErrors('interesado1.direccion')}"
                   th:errors="*{interesado1.direccion}"></div>
          </div>

          <hr class="my-4">

          <h3 class="section-title mb-3">Interesado 2</h3>

          <div class="row g-3 mb-4">
            <div class="col-md-4">
              <label class="form-label">Rol</label>
              <select th:field="*{interesado2.rol}" class="form-select">
                <option value="">Selecciona rol</option>
                <option value="COMPRADOR">Comprador</option>
                <option value="VENDEDOR">Vendedor</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label">Nombre</label>
              <input type="text" th:field="*{interesado2.nombre}" class="form-control"
              th:classappend="${#fields.hasErrors('interesado2.nombre')} ? ' is-invalid' : ''">
            <div class="invalid-feedback"
                   th:if="${#fields.hasErrors('interesado2.nombre')}"
                 th:errors="*{interesado2.nombre}"></div>
            </div>

            <div class="col-md-4">
              <label class="form-label">DNI/NIF</label>
              <input type="text"
                     th:field="*{interesado2.dni}"
                     class="form-control"
                     th:classappend="${#fields.hasErrors('interesado2.dni')} ? ' is-invalid' : ''">
            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('interesado2.dni')}"
                 th:errors="*{interesado2.dni}"></div>
            </div>
            <div class="col-md-4">
              <label class="form-label">Teléfono</label>
              <input type="text" th:field="*{interesado2.telefono}" class="form-control"
              th:classappend="${#fields.hasErrors('interesado2.telefono')} ? ' is-invalid' : ''">

            <div class="invalid-feedback"
                   th:if="${#fields.hasErrors('interesado2.telefono')}"
                   th:errors="*{interesado2.telefono}"></div>
            </div>

            <div class="col-12">
              <label class="form-label">Dirección</label>
              <input type="text" th:field="*{interesado2.direccion}" class="form-control"
              th:classappend="${#fields.hasErrors('interesado2.direccion')} ? ' is-invalid' : ''">

            <div class="invalid-feedback"
                   th:if="${#fields.hasErrors('interesado2.direccion')}"
                   th:errors="*{interesado2.direccion}"></div>
            </div>
          </div>
          </div>
        </div>



        <hr class="my-4">

        <h3 class="section-title mb-3">Documentación</h3>

        <div id="documentos-container"></div>

        <button type="button" class="btn btn-outline-primary mb-3" onclick="addDocumentoRow()">
          + Añadir documento
        </button>

        <script th:inline="javascript">

            document.addEventListener("DOMContentLoaded", function () {

            let index = 0;

            window.addDocumentoRow = function () {
            const container = document.getElementById('documentos-container');

            const row = document.createElement('div');
            row.classList.add('row', 'mb-2');

            row.innerHTML = `
            <div class="col-md-5">
                <input type="file" name="documentos[${index}].archivo" class="form-control">
            </div>

            <div class="col-md-5">
                <select name="documentos[${index}].tipoDocumento" class="form-select">
                    <option value="">Tipo</option>
                    ${generarOpcionesTipo()}
                </select>
            </div>

            <div class="col-md-2">
                <button type="button" class="btn btn-danger" onclick="this.closest('.row').remove()">
                    X
                </button>
            </div>
        `;

            container.appendChild(row);
            index++;
          }

            function generarOpcionesTipo() {
            const tipos = /*[[${tiposDocumento}]]*/ [];
            let html = "";

            tipos.forEach(tipo => {
              html += `<option value="${tipo}">${tipo.replaceAll("_", " ")}</option>`;
          });

            return html;
          }
          });
        </script>


        <div class="mb-3">
          <label class="form-label">Observaciones</label>
          <textarea th:field="*{observaciones}" class="form-control" rows="4"></textarea>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary" onclick="this.disabled=true; this.form.submit();">Guardar expediente</button>
          <a th:href="@{/expedientes}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>

</section>
</body>
</html>
