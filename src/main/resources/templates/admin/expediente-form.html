<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/app}">

<section layout:fragment="content">
  <div class="card soft-card">
    <div class="card-body">
      <h4 class="section-title mb-4">Crear expediente</h4>

      <form th:action="@{/admin/expedientes}" method="post">
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}">

        <div class="mb-3">
          <label class="form-label">Cliente</label>
          <select name="clienteId" class="form-select" required>
            <option value="">Selecciona un cliente</option>
            <option th:each="cliente : ${clientes}"
                    th:value="${cliente.id}"
                    th:text="${cliente.nombre}">
            </option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Tipo de trámite</label>
          <select name="tipoTramiteId" class="form-select" required>
            <option value="">Selecciona un tipo</option>
            <option th:each="tipo : ${tiposTramite}"
                    th:value="${tipo.id}"
                    th:text="${tipo.nombre}">
            </option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Matrícula</label>
          <input type="text" name="matricula" class="form-control" required>
        </div>

        <hr class="my-4">

        <h3 class="section-title mb-3">Interesado 1</h3>

        <div class="row g-3 mb-4">
          <div class="col-md-4">
            <label class="form-label">Rol</label>
            <select name="interesado1.rol" class="form-select">
              <option value="">Selecciona rol</option>
              <option value="COMPRADOR">Comprador</option>
              <option value="VENDEDOR">Vendedor</option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label">Nombre</label>
            <input type="text" name="interesado1.nombre" class="form-control">
          </div>

          <div class="col-md-4">
            <label class="form-label">DNI/NIF</label>
            <input type="text" name="interesado1.dni" class="form-control">
          </div>

          <div class="col-md-4">
            <label class="form-label">Teléfono</label>
            <input type="text" name="interesado1.telefono" class="form-control">
          </div>

          <div class="col-12">
            <label class="form-label">Dirección</label>
            <input type="text" name="interesado1.direccion" class="form-control">
          </div>
        </div>

        <hr class="my-4">

        <h3 class="section-title mb-3">Interesado 2</h3>

        <div class="row g-3 mb-4">
          <div class="col-md-4">
            <label class="form-label">Rol</label>
            <select name="interesado2.rol" class="form-select">
              <option value="">Selecciona rol</option>
              <option value="COMPRADOR">Comprador</option>
              <option value="VENDEDOR">Vendedor</option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label">Nombre</label>
            <input type="text" name="interesado2.nombre" class="form-control">
          </div>

          <div class="col-md-4">
            <label class="form-label">DNI/NIF</label>
            <input type="text" name="interesado2.dni" class="form-control">
          </div>

          <div class="col-md-4">
            <label class="form-label">Teléfono</label>
            <input type="text" name="interesado2.telefono" class="form-control">
          </div>

          <div class="col-12">
            <label class="form-label">Dirección</label>
            <input type="text" name="interesado2.direccion" class="form-control">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Observaciones</label>
          <textarea name="observaciones" class="form-control" rows="4"></textarea>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Guardar expediente</button>
          <a th:href="@{/expedientes}" class="btn btn-outline-secondary">Cancelar</a>
        </div>

      </form>
    </div>
  </div>
</section>
</html>
