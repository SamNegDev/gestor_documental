<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/app}">

<section layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="section-title mb-1" th:text="${cliente.id != null ? 'Editar Cliente' : 'Nuevo Cliente'}"></h4>
            <p class="text-muted mb-0">Completa la información del cliente</p>
        </div>
        <a th:href="@{/admin/clientes}" class="btn btn-outline-secondary">Volver al listado</a>
    </div>

    <div class="card soft-card">
        <div class="card-body p-4">
            <form th:action="@{/admin/clientes/guardar}" method="post" th:object="${cliente}">
                
                <input type="hidden" th:field="*{id}">

                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="form-label form-label-required">NIF/CIF</label>
                        <input type="text" class="form-control" th:field="*{nif}" required maxlength="20">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label form-label-required">Nombre / Razón Social</label>
                        <input type="text" class="form-control" th:field="*{nombre}" required maxlength="120">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label form-label-required">Email</label>
                        <input type="email" class="form-control" th:field="*{email}" required maxlength="250">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Teléfono</label>
                        <input type="text" class="form-control" th:field="*{telefono}" maxlength="20">
                    </div>

                    <div class="col-12">
                        <label class="form-label">Dirección</label>
                        <input type="text" class="form-control" th:field="*{direccion}" maxlength="200">
                    </div>
                </div>

                <hr class="my-4">

                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/admin/clientes}" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">
                        <span th:text="${cliente.id != null ? 'Guardar Cambios' : 'Crear Cliente'}"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>

</section>

</html>
