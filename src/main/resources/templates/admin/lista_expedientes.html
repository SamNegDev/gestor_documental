<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/app}">

<section layout:fragment="content">

    <div class="card soft-card">
        <div class="card-body">

            <div th:if="${expedientes == null or expedientes.isEmpty()}" class="empty-state">
                No tienes expedientes disponibles.
            </div>

            <div class="table-responsive" th:if="${expedientes != null and !expedientes.isEmpty()}">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>Nº</th>
                        <th>Tipo trámite</th>
                        <th>Matrícula</th>
                        <th>Estado</th>
                        <th>Fecha</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="expediente : ${expedientes}">
                        <td th:text="${expediente.id}"></td>
                        <td th:text="${expediente.tipoTramite != null ? expediente.tipoTramite.nombre : 'Sin tipo'}"></td>
                        <td th:text="${expediente.matricula}"></td>
                        <td>
                            <span class="badge badge-estado"
                                  th:text="${expediente.estadoExpediente}"
                                  th:classappend="${expediente.estadoExpediente.name() == 'EN_TRAMITE'} ? ' badge-tramite' :
                                                  (${expediente.estadoExpediente.name() == 'FINALIZADO'} ? ' badge-finalizado' :
                                                  (${expediente.estadoExpediente.name() == 'INCIDENCIA'} ? ' badge-incidencia' : ' badge-revision'))">
                            </span>
                        </td>
                        <td th:text="${#temporals.format(expediente.fechaCreacion, 'dd/MM/yyyy HH:mm')}"></td>
                        <td>
                            <a th:href="@{/expedientes/{id}(id=${expediente.id})}"
                               class="btn btn-sm btn-outline-primary">
                                Ver detalle
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</section>
</html>
