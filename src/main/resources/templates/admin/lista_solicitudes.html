<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/app}">

<section layout:fragment="content">

  <form th:action="@{/solicitudes}" method="get" class="row g-3 align-items-end mb-4">

    <div class="col-md-3">
      <label class="form-label">Cliente</label>
      <select name="clienteId" class="form-select">
        <option value="">Todos</option>
        <option th:each="cliente : ${clientes}"
                th:value="${cliente.id}"
                th:text="${cliente.nombre}"
                th:selected="${clienteSeleccionado != null and cliente.id == clienteSeleccionado}">
        </option>
      </select>
    </div>


    <div class="col-md-2">
      <label class="form-label">Estado</label>
      <select name="estado" class="form-select">
        <option value="">Todos</option>
        <option th:each="estado : ${estadosSolicitud}"
                th:value="${estado}"
                th:text="${#strings.replace(estado.name(), '_', ' ')}"
                th:selected="${estadoSeleccionado != null and estado == estadoSeleccionado}">
        </option>
      </select>
    </div>

    <div class="col-md-2">
      <label class="form-label">Tipo de trámite</label>
      <select name="tipoTramiteId" class="form-select">
        <option value="">Todos</option>
        <option th:each="tipo : ${tiposTramite}"
                th:value="${tipo.id}"
                th:text="${tipo.nombre}"
                th:selected="${tipoTramiteIdSeleccionado != null and tipo.id == tipoTramiteIdSeleccionado}">
        </option>
      </select>
    </div>

    <div class="col-md-2">
      <label class="form-label">Matrícula</label>
      <input type="text"
             name="matricula"
             class="form-control"
             placeholder="Buscar matrícula"
             th:value="${matriculaSeleccionada}">
    </div>

    <div class="col-md-auto">
      <button type="submit" class="btn btn-primary w-100">Filtrar</button>
    </div>

    <div class="col-md-auto" th:if="${hayFiltrosActivos}">
      <a th:href="@{/solicitudes}" class="btn btn-outline-secondary w-100">Limpiar</a>
    </div>

  </form>



  <div class="card soft-card">
    <div class="card-body">

      <div th:if="${solicitudes == null or solicitudes.isEmpty() and !hayFiltrosActivos}" class="empty-state">
        No tienes solicitudes disponibles.
      </div>
      <div th:if="${solicitudes == null or solicitudes.isEmpty() and hayFiltrosActivos}" class="empty-state">
        No tienes solicitudes disponibles con los filtros seleccionados.
      </div>

      <div class="table-responsive" th:if="${solicitudes != null and !solicitudes.isEmpty()}">
        <table class="table align-middle">
          <thead>
          <tr>
            <th>Nº</th>
            <th>Tipo trámite</th>
            <th>Cliente</th>
            <th>Matrícula</th>
            <th>Estado</th>
            <th>Usuario</th>
            <th>Fecha</th>
            <th>Acciones</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="solicitud : ${solicitudes}">
            <td th:text="${solicitud.id}"></td>
            <td th:text="${solicitud.tipoTramite != null ? solicitud.tipoTramite.nombre : 'Sin tipo'}"></td>
            <td th:text="${solicitud.cliente != null ? solicitud.cliente.nombre : 'Sin cliente'}"></td>
            <td th:text="${solicitud.matricula}"></td>
            <td>
                            <span class="badge badge-estado"
                                  th:text="${solicitud.estadoSolicitud}"
                                  th:classappend="${solicitud.estadoSolicitud.name() == 'PENDIENTE_REVISION'} ? ' badge-pendiente-revision' :
                                              (${solicitud.estadoSolicitud.name() == 'CONVERTIDA'} ? ' badge-convertida' :
                                              (${solicitud.estadoSolicitud.name() == 'PENDIENTE_DOCUMENTACION'} ? ' badge-incidencia' : ' badge-revision'))">
                            </span>
            </td>
            <td th:text="${solicitud.creadoPor != null ? solicitud.creadoPor.nombre : 'Sin usuario'}"></td>
            <td th:text="${#temporals.format(solicitud.fechaCreacion, 'dd/MM/yyyy HH:mm')}"></td>
            <td>
              <a th:href="@{/solicitudes/{id}(id=${solicitud.id})}"
                 class="btn btn-sm btn-outline-primary">
                Ver detalle
              </a>
            </td>
          </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>
</section>
</html>
