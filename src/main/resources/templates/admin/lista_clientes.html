<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/app}">

<section layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h4 class="section-title mb-1">Clientes</h4>
            <p class="text-muted mb-0">Gestiona los clientes registrados en el sistema</p>
        </div>

        <a th:href="@{/admin/clientes/nuevo}" class="btn btn-primary">
            + Nuevo cliente
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card soft-card">
        <div class="card-body">

            <div th:if="${clientes == null or clientes.isEmpty()}" class="empty-state">
                No hay clientes registrados en el sistema.
            </div>

            <div class="table-responsive" th:if="${clientes != null and !clientes.isEmpty()}">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>NIF</th>
                            <th>Nombre</th>
                            <th>Email</th>
                            <th>Teléfono</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="cliente : ${clientes}">
                            <td th:text="${cliente.id}"></td>
                            <td th:text="${cliente.nif}"></td>
                            <td th:text="${cliente.nombre}"></td>
                            <td th:text="${cliente.email}"></td>
                            <td th:text="${cliente.telefono}"></td>

                            <td>
                                <div class="d-flex gap-2">
                                    <a th:href="@{/admin/clientes/editar/{id}(id=${cliente.id})}"
                                        class="btn btn-sm btn-outline-primary">
                                        Editar
                                    </a>

                                    <form th:action="@{/admin/clientes/eliminar/{id}(id=${cliente.id})}" method="post"
                                        onsubmit="return confirm('¿Estás seguro de que deseas eliminar permanentemente este cliente?');">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">
                                            Eliminar
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</section>

</html>
