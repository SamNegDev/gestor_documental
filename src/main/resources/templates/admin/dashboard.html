<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/app}">

<section layout:fragment="content">

    <div class="row g-3 mb-4">

        <div class="col-md-3">
            <div class="card bg-primary text-white shadow-sm border-0 h-100">
                <div class="card-body text-center p-4">
                    <h3 class="display-6 fw-bold" th:text="${totalExpedientes}">0</h3>
                    <p class="mb-0">Total expedientes</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-warning text-dark shadow-sm border-0 h-100">
                <div class="card-body text-center p-4">
                    <h3 class="display-6 fw-bold" th:text="${enTramite}">0</h3>
                    <p class="mb-0">En trámite</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-success text-white shadow-sm border-0 h-100">
                <div class="card-body text-center p-4">
                    <h3 class="display-6 fw-bold" th:text="${finalizados}">0</h3>
                    <p class="mb-0">Finalizados</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-danger text-white shadow-sm border-0 h-100">
                <div class="card-body text-center p-4">
                    <h3 class="display-6 fw-bold" th:text="${incidencias}">0</h3>
                    <p class="mb-0">Con incidencia</p>
                </div>
            </div>
        </div>

    </div>

    <div class="card soft-card">
        <div class="card-body">
            <h5 class="section-title">Últimos expedientes registrados</h5>

            <div th:if="${ultimosExpedientes == null or ultimosExpedientes.isEmpty()}" class="empty-state">
                No hay expedientes registrados todavía.
            </div>

            <div class="table-responsive" th:if="${ultimosExpedientes != null and !ultimosExpedientes.isEmpty()}">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>Nº</th>
                        <th>Cliente</th>
                        <th>Matrícula</th>
                        <th>Estado</th>
                        <th>Fecha</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="expediente : ${ultimosExpedientes}">
                        <td th:text="${expediente.id}">1</td>
                        <td th:text="${expediente.cliente != null ? expediente.cliente.nombre : 'Sin cliente'}">Cliente</td>
                        <td th:text="${expediente.matricula != null ? expediente.matricula : '-'}">1234ABC</td>
                        <td>
                            <span class="badge badge-estado"
                                  th:text="${expediente.estadoExpediente}"
                                  th:classappend="${expediente.estadoExpediente.name() == 'EN_TRAMITE'} ? ' badge-tramite' :
                                                  (${expediente.estadoExpediente.name() == 'FINALIZADO'} ? ' badge-finalizado' :
                                                  ' badge-incidencia')">
                            </span>
                        </td>
                        <td th:text="${#temporals.format(expediente.fechaCreacion, 'dd/MM/yyyy HH:mm')}">22/03/2026 10:30</td>
                        <td>
                            <a th:href="@{/expedientes/{id}(id=${expediente.id})}"
                               class="btn btn-sm btn-outline-primary">
                                Ver detalle
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</section>
</html>
