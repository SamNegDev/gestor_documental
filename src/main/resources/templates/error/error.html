<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo} ?: 'Error'">Error</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div class="container py-5 d-flex justify-content-center">
    <div class="card soft-card shadow-sm border-0" style="max-width: 600px; width: 100%;">

        <!-- Cabecera -->
        <div class="card-body text-center p-4">

            <!-- Icono -->
            <div class="mb-3">
                <span class="display-5"
                      th:text="${tipo == 'danger'} ? '⛔' : '⚠️'">⚠️</span>
            </div>

            <!-- Título -->
            <h2 class="fw-bold mb-2"
                th:text="${titulo} ?: 'Se ha producido un error'">
                Error
            </h2>

            <!-- Mensaje -->
            <p class="text-muted mb-4"
               th:text="${mensaje} ?: 'Ha ocurrido un problema inesperado.'">
                Mensaje de error
            </p>

            <!-- Badge tipo -->
            <div class="mb-4">
                <span class="badge"
                      th:classappend="${tipo == 'danger'} ? ' bg-danger' : ' bg-warning text-dark'"
                      th:text="${tipo == 'danger'} ? 'Error' : 'Aviso'">
                    Error
                </span>
            </div>

            <!-- Acciones -->
            <div class="d-flex justify-content-center gap-2 flex-wrap">
                <a href="javascript:history.back()" class="btn btn-outline-secondary">
                    ← Volver
                </a>

                <a th:href="@{/}" class="btn btn-primary">
                    Ir al inicio
                </a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
