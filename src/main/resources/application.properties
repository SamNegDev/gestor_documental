spring.application.name=gestor_documental
spring.datasource.url=jdbc:mysql://localhost:3306/gestor_documental
spring.datasource.username=root
spring.datasource.password=samuelin1

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.orm.jdbc.bind=warn

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB

server.tomcat.max-http-form-post-size=50MB
server.tomcat.max-swallow-size=50MB
server.tomcat.max-part-count=-1
server.tomcat.max-part-header-size=4096
server.tomcat.max-parameter-count=-1

logging.level.org.apache.catalina=DEBUG
logging.level.org.apache.tomcat=DEBUG
logging.level.org.springframework.web.multipart=DEBUG

app.ocr.tessdata-path=C:\\Tesseract\\Tesseract-OCR\\tessdata
app.ocr.language=spa
app.ocr.dpi=300

spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
