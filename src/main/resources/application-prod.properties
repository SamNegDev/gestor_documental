# =========================================================
# APP
# =========================================================
spring.application.name=gestor_documental
server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=framework

# =========================================================
# DATABASE
# =========================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=30000

# =========================================================
# JPA / HIBERNATE
# =========================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# =========================================================
# FILE UPLOAD
# =========================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:25MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:100MB}
app.upload.dir=${UPLOAD_DIR:/app/uploads}
app.upload.allowed-extensions=${UPLOAD_ALLOWED_EXTENSIONS:pdf,jpg,jpeg,png}

# =========================================================
# INITIAL ADMIN
# =========================================================
app.initial-admin.email=${APP_ADMIN_EMAIL:}
app.initial-admin.password=${APP_ADMIN_PASSWORD:}

# =========================================================
# SESSION / COOKIES
# In local Docker without HTTPS, set COOKIE_SECURE=false in .env.
# In VPS with HTTPS, set COOKIE_SECURE=true.
# =========================================================
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${COOKIE_SECURE:true}
server.servlet.session.cookie.same-site=lax

# =========================================================
# LOGS
# =========================================================
logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN
logging.file.name=${LOG_FILE:/app/logs/gestor-documental.log}

# =========================================================
# ACTUATOR
# =========================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.health.mail.enabled=${MAIL_HEALTH_ENABLED:false}

# =========================================================
# TESSERACT / OCR
# This path matches eclipse-temurin:17-jre-jammy + apt package tesseract-ocr-spa.
# =========================================================
app.ocr.tesseract-path=${TESSERACT_PATH:tesseract}
app.ocr.tessdata-path=${TESSERACT_DATAPATH:}
app.ocr.tessdataPath=${TESSERACT_DATAPATH:}
app.ocr.language=spa
app.ocr.dpi=200
app.ocr.page-timeout-seconds=${OCR_PAGE_TIMEOUT_SECONDS:45}
app.ocr.max-processing-seconds=${OCR_MAX_PROCESSING_SECONDS:360}
app.ocr.expediente-completo.concurrent-jobs=${OCR_EXPEDIENTE_COMPLETO_CONCURRENT_JOBS:2}

# =========================================================
# CARTOCIUDAD / CODIGOS POSTALES
# =========================================================
app.cartociudad.enabled=${CARTOCIUDAD_ENABLED:true}
app.cartociudad.candidates-url=${CARTOCIUDAD_CANDIDATES_URL:https://www.cartociudad.es/geocoder/api/geocoder/candidates}
app.cartociudad.timeout-seconds=${CARTOCIUDAD_TIMEOUT_SECONDS:8}

# =========================================================
# MAIL
# =========================================================
spring.mail.host=${MAIL_HOST:smtp.office365.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.provider=${MAIL_PROVIDER:smtp}
app.mail.from=${MAIL_FROM:}
app.mail.from-name=${MAIL_FROM_NAME:Gestoria CN}
app.mail.graph.tenant-id=${MAIL_GRAPH_TENANT_ID:}
app.mail.graph.client-id=${MAIL_GRAPH_CLIENT_ID:}
app.mail.graph.client-secret=${MAIL_GRAPH_CLIENT_SECRET:}
app.mail.graph.sender=${MAIL_GRAPH_SENDER:${MAIL_FROM:}}
app.mail.graph.save-to-sent-items=${MAIL_GRAPH_SAVE_TO_SENT_ITEMS:true}
app.daily-summary.enabled=${APP_DAILY_SUMMARY_ENABLED:false}
app.daily-summary.bcc-recipients=${APP_DAILY_SUMMARY_BCC_RECIPIENTS:samuel.negrin@gestoriacn.com}
app.daily-summary.cron=${APP_DAILY_SUMMARY_CRON:0 0 17 * * *}
app.daily-summary.zone=${APP_DAILY_SUMMARY_ZONE:Atlantic/Canary}
app.daily-finalized.enabled=${APP_DAILY_FINALIZED_ENABLED:true}
app.daily-finalized.bcc-recipients=${APP_DAILY_FINALIZED_BCC_RECIPIENTS:samuel.negrin@gestoriacn.com}
app.daily-finalized.cron=${APP_DAILY_FINALIZED_CRON:0 0 17 * * *}
app.daily-finalized.zone=${APP_DAILY_FINALIZED_ZONE:Atlantic/Canary}
app.mail.inbound.enabled=${MAIL_INBOUND_ENABLED:false}
app.mail.inbound.provider=${MAIL_INBOUND_PROVIDER:${MAIL_PROVIDER:imap}}
app.mail.inbound.host=${MAIL_INBOUND_HOST:outlook.office365.com}
app.mail.inbound.port=${MAIL_INBOUND_PORT:993}
app.mail.inbound.protocol=${MAIL_INBOUND_PROTOCOL:imaps}
app.mail.inbound.username=${MAIL_INBOUND_USERNAME:${MAIL_USERNAME:}}
app.mail.inbound.password=${MAIL_INBOUND_PASSWORD:${MAIL_PASSWORD:}}
app.mail.inbound.folder=${MAIL_INBOUND_FOLDER:INBOX}
app.mail.inbound.poll-delay-ms=${MAIL_INBOUND_POLL_DELAY_MS:300000}
app.mail.inbound.initial-delay-ms=${MAIL_INBOUND_INITIAL_DELAY_MS:60000}
app.mail.inbound.max-messages=${MAIL_INBOUND_MAX_MESSAGES:10}
app.mail.inbound.default-cliente-id=${MAIL_INBOUND_DEFAULT_CLIENTE_ID:}
app.mail.inbound.admin-email=${MAIL_INBOUND_ADMIN_EMAIL:${APP_ADMIN_EMAIL:}}
app.mail.inbound.default-tipo-tramite=${MAIL_INBOUND_DEFAULT_TIPO_TRAMITE:TRASPASO}
app.mail.inbound.graph.mailbox=${MAIL_INBOUND_GRAPH_MAILBOX:${MAIL_GRAPH_SENDER:${MAIL_FROM:}}}
app.public-url=${APP_PUBLIC_URL:}

# =========================================================
# WHATSAPP
# =========================================================
app.whatsapp.webhook.verify-token=${WHATSAPP_WEBHOOK_VERIFY_TOKEN:}
app.whatsapp.app-secret=${WHATSAPP_APP_SECRET:}
app.whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN:}
app.whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}
app.whatsapp.business-account-id=${WHATSAPP_BUSINESS_ACCOUNT_ID:}
app.whatsapp.graph-api-version=${WHATSAPP_GRAPH_API_VERSION:v23.0}
app.whatsapp.menu-image-url=${WHATSAPP_MENU_IMAGE_URL:}
