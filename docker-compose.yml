services:
  mysql:
    image: mysql:8.4
    container_name: gestor_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Atlantic/Canary
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build: .
    container_name: gestor_app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Atlantic/Canary&characterEncoding=utf8"
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver

      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Atlantic/Canary&characterEncoding=utf8
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}

      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_OPEN_IN_VIEW: "false"
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect

      APP_ADMIN_EMAIL: ${APP_ADMIN_EMAIL}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD}

      UPLOAD_DIR: ${UPLOAD_DIR}
      UPLOAD_ALLOWED_EXTENSIONS: ${UPLOAD_ALLOWED_EXTENSIONS:-pdf,jpg,jpeg,png}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE}
      MAX_REQUEST_SIZE: ${MAX_REQUEST_SIZE}
      LOG_FILE: ${LOG_FILE}
      TESSERACT_PATH: ${TESSERACT_PATH:-tesseract}
      TESSERACT_DATAPATH: ${TESSERACT_DATAPATH:-}
      COOKIE_SECURE: ${COOKIE_SECURE}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_HEALTH_ENABLED: ${MAIL_HEALTH_ENABLED:-false}
      MAIL_PROVIDER: ${MAIL_PROVIDER:-smtp}
      MAIL_HOST: ${MAIL_HOST:-smtp.office365.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Gestoria CN}
      MAIL_GRAPH_TENANT_ID: ${MAIL_GRAPH_TENANT_ID:-}
      MAIL_GRAPH_CLIENT_ID: ${MAIL_GRAPH_CLIENT_ID:-}
      MAIL_GRAPH_CLIENT_SECRET: ${MAIL_GRAPH_CLIENT_SECRET:-}
      MAIL_GRAPH_SENDER: ${MAIL_GRAPH_SENDER:-}
      MAIL_GRAPH_SAVE_TO_SENT_ITEMS: ${MAIL_GRAPH_SAVE_TO_SENT_ITEMS:-true}
      MAIL_INBOUND_ENABLED: ${MAIL_INBOUND_ENABLED:-false}
      MAIL_INBOUND_HOST: ${MAIL_INBOUND_HOST:-outlook.office365.com}
      MAIL_INBOUND_PORT: ${MAIL_INBOUND_PORT:-993}
      MAIL_INBOUND_PROTOCOL: ${MAIL_INBOUND_PROTOCOL:-imaps}
      MAIL_INBOUND_USERNAME: ${MAIL_INBOUND_USERNAME:-${MAIL_USERNAME:-}}
      MAIL_INBOUND_PASSWORD: ${MAIL_INBOUND_PASSWORD:-${MAIL_PASSWORD:-}}
      MAIL_INBOUND_FOLDER: ${MAIL_INBOUND_FOLDER:-INBOX}
      MAIL_INBOUND_POLL_DELAY_MS: ${MAIL_INBOUND_POLL_DELAY_MS:-300000}
      MAIL_INBOUND_INITIAL_DELAY_MS: ${MAIL_INBOUND_INITIAL_DELAY_MS:-60000}
      MAIL_INBOUND_MAX_MESSAGES: ${MAIL_INBOUND_MAX_MESSAGES:-10}
      MAIL_INBOUND_DEFAULT_CLIENTE_ID: ${MAIL_INBOUND_DEFAULT_CLIENTE_ID:-}
      MAIL_INBOUND_ADMIN_EMAIL: ${MAIL_INBOUND_ADMIN_EMAIL:-${APP_ADMIN_EMAIL:-}}
      MAIL_INBOUND_DEFAULT_TIPO_TRAMITE: ${MAIL_INBOUND_DEFAULT_TIPO_TRAMITE:-TRASPASO}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:-}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_BUSINESS_ACCOUNT_ID: ${WHATSAPP_BUSINESS_ACCOUNT_ID:-}
      WHATSAPP_GRAPH_API_VERSION: ${WHATSAPP_GRAPH_API_VERSION:-v23.0}
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail --silent http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  mysql_data:
